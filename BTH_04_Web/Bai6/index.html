<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="body" data-set="1">
            <form class="form">
                <h2>Đăng kí tài khoản</h2>
                <div class="box">
                    <input type="text" class="inputname" placeholder="Nhập tên của bạn">
                    <span class="inputname-error"></span>
                </div>
                <div class="box">
                    <input type="date" class="inputdate" >
                    <span class="inputdate-error"></span>
                </div>
                <div class="sexinput">
                    <input type="radio" class="sex" id="sex1" name="sex" value="Nam">
                    <label for="sex1" >Nam</label>
                    <input type="radio" class="sex" id="sex2" name="sex" value="Nữ">
                    <label for="sex2" >Nữ</label>
                </div>
                <div class="btn">
                    <!-- <button class="btnprevious" type="button">Quay lại</button> -->
                    <button class="next" type="button">Tiếp theo</button>
                </div>
            </form>
        </div>
        <div class="box2" data-set="2">
            <form class="form">
                <h2>Đăng kí tài khoản</h2>
                <div class="box">
                    <input type="email" class="inputemail" placeholder="Nhập email của bạn">
                    <span class="inputemail-error"></span>
                </div>
                <div class="box">
                    <input type="password" class="inputpassword" placeholder="Nhập mật khẩu của bạn">
                    <span class="inputpassword-error"></span>
                </div>
                <div class="box">
                    <input type="password" class="inputpassword2" placeholder="Nhập lại mật khẩu của bạn">
                    <span class="inputpassword2-error"></span>
                </div>
                <div class="btn">
                    <button class="btnprevious" type="button">Quay lại</button>
                    <button class="next" type="button">Tiếp theo</button>
                </div>
            </form>
        </div>
        <div class="box3" data-set="3">
            <h2>Thông tin tài khoản</h2>
            <div class="info">
                <div class="box1">
                    <div class="title">Tên</div>
                    <div class="textname"></div>
                </div>
                <div class="box1">
                    <div class="title">Ngày sinh</div>
                    <div class="textdate"></div>
                </div>
                <div class="box1">
                    <div class="title">Giới tính</div>
                    <div class="textsex"></div>
                </div>
                <div class="box1">
                    <div class="title">Email</div>
                    <div class="textemail"></div>
                </div>
                <div class="box1">
                    <div class="title">Mật khẩu</div>
                    <div class="textmk"></div>
                </div>
            </div>
            <div class="control">

                <button class="btnprevious" type="button">Quay lại</button>
                <button class="ok" type="button">Xác nhận</button>
            </div>
            
        </div>
        <div class="progress">
            <span class="text">1/3</span>
            <span class="color"></span>
        </div>
    </div>
    <div class="success">
        <i class="fa-solid fa-check"></i>
        <p>Đăng kí thành công</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
